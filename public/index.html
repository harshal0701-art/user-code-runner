<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Cloud Compiler</title>
    <!-- Tailwind CSS for sleek UI styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">

    <!-- Navbar -->
    <header class="bg-gray-800 border-b border-gray-700 p-4 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider text-cyan-400">⚡ AWS CodePipeline Compiler</h1>
            <span class="text-xs bg-gray-700 px-3 py-1 rounded-full text-gray-400">Environment: EC2 to S3 Sandbox</span>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-4 grid grid-cols-1 lg:grid-cols-2 gap-4">
        
        <!-- Left Panel: Code Input Configuration -->
        <section class="flex flex-col bg-gray-800 rounded-lg p-4 border border-gray-700 shadow-lg">
            <h2 class="text-lg font-semibold mb-3 text-gray-300">Source Code Editor</h2>
            
            <!-- Controls Grid -->
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">LANGUAGE</label>
                    <select id="languageSelect" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-sm focus:outline-none focus:border-cyan-500" onchange="updateExtension()">
                        <option value="python">Python 3.11</option>
                        <option value="java">Java 17 (Corretto)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">FILE NAME</label>
                    <div class="flex items-center bg-gray-700 border border-gray-600 rounded text-sm px-2 focus-within:border-cyan-500">
                        <input id="filenameInput" type="text" value="sum" class="w-full bg-transparent p-2 focus:outline-none" placeholder="filename" />
                        <span id="extLabel" class="text-gray-400 font-mono pr-1">.py</span>
                    </div>
                </div>
            </div>

            <!-- Code Area -->
            <div class="flex-1 flex flex-col min-h-[350px]">
                <label class="block text-xs font-semibold text-gray-400 mb-1">WRITE CODE HERE</label>
                <textarea id="codeEditor" class="flex-1 w-full p-4 bg-gray-950 text-emerald-400 font-mono text-sm border border-gray-700 rounded focus:outline-none focus:border-cyan-500 resize-none leading-relaxed" spellcheck="false"># Dynamic AWS Execution Engine Test
def main():
    a = 5
    b = 10
    print(f"The sum of {a} and {b} is {a + b}")

if __name__ == "__main__":
    main()
</textarea>
            </div>

            <!-- Trigger Button -->
            <button id="runBtn" onclick="submitCode()" class="mt-4 w-full bg-cyan-600 hover:bg-cyan-500 text-white font-semibold py-3 px-4 rounded transition duration-200 flex justify-center items-center space-x-2">
                <span>Check & Execute Code</span>
            </button>
        </section>

        <!-- Right Panel: Dynamic Console Monitor -->
        <section class="flex flex-col bg-gray-800 rounded-lg p-4 border border-gray-700 shadow-lg">
            <h2 class="text-lg font-semibold mb-3 text-gray-300">Execution Output Terminal</h2>
            
            <!-- Status Tracker Alert -->
            <div id="statusAlert" class="mb-4 p-3 bg-gray-700 border border-gray-600 rounded text-sm text-gray-300 flex items-center space-x-2">
                <span class="inline-block w-2.5 h-2.5 rounded-full bg-gray-500 animate-pulse" id="statusIndicator"></span>
                <span id="statusText">Status: Idle. Awaiting execution trigger.</span>
            </div>

            <!-- Console Window -->
            <div class="flex-1 bg-black rounded border border-gray-800 p-4 font-mono text-sm overflow-y-auto min-h-[350px] relative">
                <pre id="consoleOutput" class="text-gray-400 whitespace-pre-wrap">Awaiting Code Submission run request...</pre>
            </div>
        </section>
    </main>

    <!-- Frontend Scripting Interface Logic -->
    <script>
        const templates = {
            python: `# Dynamic AWS Execution Engine Test\ndef main():\n    a = 5\n    b = 10\n    print(f"The sum of {a} and {b} is {a + b}")\n\nif __name__ == "__main__":\n    main()`,
            java: `// Make sure your class name matches the filename exactly!\npublic class sum {\n    public static void main(String[] args) {\n        int a = 5;\n        int b = 10;\n        System.out.println("The sum of " + a + " and " + b + " is " + (a + b));\n    }\n}`
        };

        function updateExtension() {
            const lang = document.getElementById('languageSelect').value;
            const extLabel = document.getElementById('extLabel');
            const editor = document.getElementById('codeEditor');
            const filenameInput = document.getElementById('filenameInput');
            
            if (lang === 'python') {
                extLabel.innerText = '.py';
                filenameInput.value = 'sum';
                editor.value = templates.python;
            } else {
                extLabel.innerText = '.java';
                filenameInput.value = 'sum';
                editor.value = templates.java;
            }
        }

        async function submitCode() {
            const runBtn = document.getElementById('runBtn');
            const statusAlert = document.getElementById('statusAlert');
            const statusIndicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            const consoleOutput = document.getElementById('consoleOutput');
            
            const filename = document.getElementById('filenameInput').value.trim();
            const ext = document.getElementById('extLabel').innerText;
            const code = document.getElementById('codeEditor').value;

            if(!filename) {
                alert("Please provide a valid file name configuration.");
                return;
            }

            const fullFilename = filename + ext;

            // Update UI State to Processing
            runBtn.disabled = true;
            runBtn.classList.add('opacity-50', 'cursor-not-allowed');
            statusAlert.className = "mb-4 p-3 bg-amber-950/40 border border-amber-700/50 rounded text-sm text-amber-300 flex items-center space-x-2";
            statusIndicator.className = "inline-block w-2.5 h-2.5 rounded-full bg-amber-500 animate-spin";
            statusText.innerText = "Status: Code pushed. AWS CodePipeline is building the workspace environment...";
            consoleOutput.innerText = "Running continuous remote compilation logs checks via S3 polling streams...";
            consoleOutput.className = "text-amber-400 whitespace-pre-wrap";

            try {
                const response = await fetch('/api/compile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename: fullFilename, code: code })
                });
                
                const result = await response.json();

                if (result.success) {
                    statusAlert.className = "mb-4 p-3 bg-emerald-950/40 border border-emerald-700/50 rounded text-sm text-emerald-300 flex items-center space-x-2";
                    statusIndicator.className = "inline-block w-2.5 h-2.5 rounded-full bg-emerald-500";
                    statusText.innerText = "Status: Code executed successfully!";
                    consoleOutput.className = "text-emerald-400 whitespace-pre-wrap";
                } else {
                    statusAlert.className = "mb-4 p-3 bg-rose-950/40 border border-rose-700/50 rounded text-sm text-rose-300 flex items-center space-x-2";
                    statusIndicator.className = "inline-block w-2.5 h-2.5 rounded-full bg-rose-500";
                    statusText.innerText = "Status: Build/Compilation Error encountered.";
                    consoleOutput.className = "text-rose-400 whitespace-pre-wrap";
                }
                consoleOutput.innerText = result.output;

            } catch (err) {
                statusAlert.className = "mb-4 p-3 bg-rose-950/40 border border-rose-700/50 rounded text-sm text-rose-300 flex items-center space-x-2";
                statusIndicator.className = "inline-block w-2.5 h-2.5 rounded-full bg-rose-500";
                statusText.innerText = "Status: Local network routing connection failure.";
                consoleOutput.innerText = "Failed to establish execution tracking pipeline connection handshake: " + err.message;
                consoleOutput.className = "text-rose-500 whitespace-pre-wrap";
            } finally {
                runBtn.disabled = false;
                runBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
